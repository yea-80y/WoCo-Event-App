<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoCo Embed Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 1rem;
      background: #f5f5f5;
    }
    h1 { font-size: 1.25rem; color: #333; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <h1>WoCo Embed Test</h1>

  <iframe
    src="https://events-api.woco-net.com/embed/frame/dc073d3a-f9f0-48ac-a8cf-98b57a9e0f87?claim-mode=both"
    id="woco-frame-dc073d3a"
    style="width:100%;border:none;overflow:hidden;min-height:200px;"
    title="Ticket widget"
    allow="publickey-credentials-get *; publickey-credentials-create *"
  ></iframe>
  <script>
  window.addEventListener('message', function(e) {
    if (e.origin !== 'https://events-api.woco-net.com') return;
    var frame = document.getElementById('woco-frame-dc073d3a');
    if (!frame || e.source !== frame.contentWindow) return;
    if (e.data.type === 'woco-resize') frame.style.height = e.data.height + 'px';
    if (e.data.type === 'woco-claim') console.log('Ticket claimed:', e.data.detail);
  });
  </script>
</body>
</html>
