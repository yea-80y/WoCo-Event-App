name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Node 20 matches apps/server/Dockerfile — CI must build what production runs.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Typecheck server
        run: npm run build:server

      - name: Build web
        run: npm run build:web

      - name: Build embed
        run: npm run build:embed
