name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      # Must match apps/server/Dockerfile + .nvmrc — CI builds what production runs.
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # packages/shared ships raw TS (main: ./src/index.ts) — consumers compile it,
      # so there is nothing to build, only to typecheck.
      - name: Typecheck shared
        run: npm run check -w @woco/shared

      - name: Test shared (POD signing)
        run: npm test -w @woco/shared

      # Golden vectors pinning POD identity derivation. These existed but were
      # never run in CI — the exact gap that would let a crypto bump silently
      # change every user's identity behind a green build.
      - name: Test web (POD identity golden vectors)
        run: npm test -w @woco/web

      - name: Typecheck server
        run: npm run build:server

      # Sponsor-wallet nonce queue. Guards a money path: a nonce collision on
      # batchClaimFor charges a buyer and mints no ticket, and the retry path
      # must never re-broadcast an in-flight tx (double-mint). Typecheck cannot
      # see either — contract methods are any-typed.
      - name: Test server (sponsor nonce queue)
        run: npm run test:server

      - name: Build web
        run: npm run build:web

      - name: Build embed
        run: npm run build:embed
